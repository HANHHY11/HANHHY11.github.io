<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>归档 | 历史文章</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        body { 
            /* 使用与主页相同的背景逻辑 */
            background: linear-gradient(rgba(10, 10, 16, 0.8), rgba(10, 10, 16, 0.8)), 
                        url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff; 
            min-height: 100vh; 
            padding: 80px 20px 50px; /* 顶部留出返回按钮空间 */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* 返回按钮 - 增加了毛玻璃感 */
        .back-btn { 
            position: fixed; top: 20px; left: 20px; 
            color: #00ccff; text-decoration: none; font-size: 14px; 
            padding: 8px 16px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px); border: 1px solid rgba(0,204,255,0.3);
            border-radius: 50px; transition: 0.3s; z-index: 10; 
        }
        .back-btn:hover { 
            background: #00ccff; color: #000; 
            box-shadow: 0 0 15px rgba(0,204,255,0.5); 
        }

        h1 { margin-bottom: 50px; font-size: 28px; letter-spacing: 2px; color: #00ccff; text-shadow: 0 0 10px rgba(0,204,255,0.3); }

        /* 时间轴容器 */
        .timeline { position: relative; max-width: 650px; width: 100%; }
        
        /* 中间的竖线 */
        .timeline::before {
            content: ''; position: absolute; left: 20px; top: 0;
            width: 2px; height: 100%; background: rgba(0, 204, 255, 0.2);
        }

        .timeline-item { position: relative; margin-bottom: 40px; padding-left: 60px; }

        /* 发光圆点 */
        .timeline-dot {
            position: absolute; left: 15px; top: 5px;
            width: 12px; height: 12px; background: #00ccff;
            border-radius: 50%; box-shadow: 0 0 10px #00ccff;
        }

        .timeline-date { font-size: 14px; color: #00ccff; margin-bottom: 8px; font-weight: bold; opacity: 0.8; }

        /* 文章卡片 - 采用毛玻璃效果 */
        .timeline-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; display: block; color: #ddd;
        }

        .timeline-content:hover {
            background: rgba(0, 204, 255, 0.1);
            border-color: rgba(0, 204, 255, 0.5);
            transform: translateX(10px) scale(1.02);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .timeline-title { font-size: 18px; margin-bottom: 8px; color: #fff; }
        .timeline-desc { font-size: 14px; color: #aaa; line-height: 1.6; }

        @media (max-width: 480px) {
            .timeline::before { left: 10px; }
            .timeline-dot { left: 5px; }
            .timeline-item { padding-left: 40px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← 返回主页</a>

    <h1>文章归档</h1>

    <div class="timeline">
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-date">2026-03-29</div>
            <a href="posts/first-blog.html" class="timeline-content">
                <div class="timeline-title">欢迎来到我的个人博客</div>
                <div class="timeline-desc">这是我的第一篇正式文章，记录了搭建这个网站的技术细节和初衷。</div>
            </a>
        </div>
    </div>

</body>
</html>
