<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANHHY11 | 文章专栏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            /* 背景图指向 background.jpg */
            background: linear-gradient(rgba(10, 10, 16, 0.7), rgba(10, 10, 16, 0.7)), 
                        url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .content { z-index: 1; padding: 40px 20px; max-width: 800px; width: 100%; text-align: center; }
        h1 { font-size: clamp(32px, 8vw, 50px); margin-bottom: 10px; letter-spacing: 2px; background: linear-gradient(45deg, #fff, #00ccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .typing-container { min-height: 30px; margin-bottom: 40px; }
        .typing { font-size: 20px; color: #aaa; border-right: 2px solid #00ccff; display: inline-block; white-space: nowrap; overflow: hidden; padding-right: 5px; animation: blink 0.8s step-end infinite; }

        .article-list { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px; 
            padding: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: left; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .list-header { margin-bottom: 20px; font-weight: bold; color: #00ccff; font-size: 18px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(0, 204, 255, 0.2); padding-bottom: 10px; }
        .article-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; text-decoration: none; color: #ddd; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s ease; border-radius: 8px; }
        .article-item:last-of-type { border-bottom: none; }
        .article-item:hover { background: rgba(0, 204, 255, 0.1); color: #fff; transform: translateX(8px); }
        .article-date { font-size: 14px; color: #888; }

        .history-btn-wrapper { margin-top: 30px; text-align: center; }
        .history-btn {
            display: inline-block;
            padding: 12px 32px;
            color: #00ccff;
            text-decoration: none;
            font-size: 15px;
            border: 1px solid rgba(0, 204, 255, 0.4);
            border-radius: 50px;
            transition: all 0.4s ease;
            background: rgba(0, 204, 255, 0.05);
            backdrop-filter: blur(5px);
        }
        .history-btn:hover { background: #00ccff; color: #000; box-shadow: 0 0 20px rgba(0, 204, 255, 0.6); transform: translateY(-3px); }

        @keyframes blink { 50% { border-color: transparent; } }
    </style>
</head>
<body>

<div id="particles"></div>

<div class="content">
    <h1>HANHHY11</h1>
    <div class="typing-container">
        <div class="typing" id="type-text"></div>
    </div>

    <div class="article-list">
        <div class="list-header">✨ 近期发布</div>
        
        <a href="posts/first-blog.html" class="article-item">
            <span class="article-title">欢迎来到我的个人博客</span>
            <span class="article-date">2024-05-20</span>
        </a>

        <a href="#" class="article-item">
            <span class="article-title">GitHub Pages 进阶指南</span>
            <span class="article-date">2024-05-21</span>
        </a>

        <div class="history-btn-wrapper">
            <a href="history.html" class="history-btn">查看历史文章 (History) →</a>
        </div>
    </div>
</div>

<script>
    const text = "记录技术点滴，分享生活瞬间";
    const target = document.getElementById("type-text");
    let i = 0;
    function typing() {
        if (i < text.length) {
            target.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 150);
        }
    }
    window.onload = typing;

    const pContainer = document.getElementById("particles");
    for (let n = 0; n < 40; n++) {
        let s = document.createElement("div");
        let size = Math.random() * 2 + 1;
        s.style.cssText = `position: absolute; width: ${size}px; height: ${size}px; background: rgba(255,255,255,${Math.random() * 0.4 + 0.1}); border-radius: 50%; top: ${Math.random() * 100}%; left: ${Math.random() * 100}%;`;
        pContainer.appendChild(s);
        s.animate([{ transform: 'translate(0, 0)' }, { transform: `translate(${Math.random() * 80 - 40}px, ${Math.random() * 80 - 40}px)` }, { transform: 'translate(0, 0)' }], { duration: Math.random() * 10000 + 10000, iterations: Infinity });
    }
</script>
</body>
</html>
