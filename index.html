<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANHHY11 | 个人主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#0a0a10;color:#fff;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 20px}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
.content{z-index:1}
h1{font-size:50px;margin-bottom:20px;letter-spacing:2px}
.typing{font-size:22px;color:#aaa;border-right:3px solid #00ccff;white-space:nowrap;overflow:hidden}
.buttons{margin-top:40px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{padding:14px 28px;border-radius:8px;text-decoration:none;color:#fff;background:#0066ff;border:none;font-size:16px;transition:0.3s}
.btn:hover{background:#0088ff;transform:translateY(-3px)}
</style>
</head>
<body>
<div id="particles"></div>
<div class="content">
  <h1>HANHHY11</h1>
  <div class="typing">GitHub Pages 永久免费个人网站</div>
  <div class="buttons">
    <a href="#" class="btn">首页</a>
    <a href="#" class="btn">项目</a>
    <a href="#" class="btn">关于</a>
  </div>
</div>

<script>
// 打字机效果
let text = "GitHub Pages 永久免费个人网站";
let i = 0;
function typing(){
  if(i<text.length){
    document.querySelector(".typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,100);
  }
}
typing();

// 简化粒子背景
let p = document.getElementById("particles");
for(let n=0;n<50;n++){
  let s = document.createElement("div");
  s.style.cssText = `
    position:absolute;
    width:${Math.random()*3+1}px;
    height:${Math.random()*3+1}px;
    background:#fff;
    border-radius:50%;
    top:${Math.random()*100}%;
    left:${Math.random()*100}%;
    opacity:${Math.random()*0.6+0.2};
    animation:float ${Math.random()*10+10}s linear infinite`;
  p.appendChild(s);
}

let style = document.createElement('style');
style.innerHTML = `@keyframes float{0%{transform:translate(0,0)}50%{transform:translate(${Math.random()*40-20}px,${Math.random()*40-20}px)}100%{transform:translate(0,0)}}`;
document.head.appendChild(style);
</script>
</body>
</html>
